name: windows-msvc-build

on:
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional existing release tag to attach the Windows MSVC archive to; leave empty to only upload the workflow artifact
        required: false
        type: string

permissions:
  contents: write

jobs:
  windows-msvc-x86:
    runs-on: windows-2025
    env:
      WINDOWS_MSVC_BASE_IMAGE: mcr.microsoft.com/dotnet/framework/runtime:4.8.1-windowsservercore-ltsc2025

    steps:
      - name: Enable long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Docker availability
        shell: pwsh
        run: docker version

      - name: Prepare Windows container base image
        shell: pwsh
        run: docker pull $env:WINDOWS_MSVC_BASE_IMAGE

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -DTSB_WINDOWS_CONTAINER_ISOLATION=process "-DTSB_WINDOWS_MSVC_BASE_IMAGE=$env:WINDOWS_MSVC_BASE_IMAGE"

      - name: Build Windows MSVC targets
        shell: pwsh
        run: cmake --build build --target ncat-windows-msvc-x86 nmap-windows-msvc-x86 --config Release

      - name: Package artifacts
        shell: pwsh
        run: Compress-Archive -Path artifacts\ncat\windows-msvc-x86,artifacts\nmap\windows-msvc-x86 -DestinationPath windows-msvc-x86-artifacts.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc-x86-artifacts
          path: windows-msvc-x86-artifacts.zip
          if-no-files-found: error

      - name: Attach archive to release
        if: ${{ inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: windows-msvc-x86-artifacts.zip