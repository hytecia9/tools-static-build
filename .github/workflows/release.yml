name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  dockcross-release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build verified subset
        run: cmake --build build --target all-static --config Release

      - name: Package artifacts
        run: tar -C artifacts -czf dockcross-verified-artifacts.tar.gz .

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dockcross-release-artifacts
          path: dockcross-verified-artifacts.tar.gz
          if-no-files-found: error

  windows-msvc-release-build:
    uses: ./.github/workflows/windows-msvc.yml
    with:
      release_tag: ''

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - dockcross-release-build
      - windows-msvc-release-build
    if: ${{ always() && needs.dockcross-release-build.result == 'success' && needs.windows-msvc-release-build.result == 'success' }}

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: dockcross-release-artifacts
          path: release

      - name: Download Windows MSVC artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-msvc-x86-artifacts
          path: release

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: release/dockcross-verified-artifacts.tar.gz
          generate_release_notes: true

      - name: Attach Windows MSVC archive
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: release/windows-msvc-x86-artifacts.zip
